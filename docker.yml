---
- name: Install containerd on RHEL 10
  hosts: all
  become: true

  tasks:

    - name: Install required tools
      dnf:
        name:
          - dnf-plugins-core
        state: present

    - name: Add Docker repo (for containerd)
      command: >
        dnf config-manager --add-repo
        https://download.docker.com/linux/centos/docker-ce.repo

    - name: Enable Docker stable repo
      command: dnf config-manager --enable docker-ce-stable

    - name: Install containerd.io
      dnf:
        name: containerd.io
        state: present

    - name: Create containerd config dir
      file:
        path: /etc/containerd
        state: directory

    - name: Generate default config
      command: containerd config default
      register: containerd_config
      changed_when: false

    - name: Write config
      copy:
        dest: /etc/containerd/config.toml
        content: "{{ containerd_config.stdout }}"

    # 🔥 REQUIRED FIX (your system uses cgroup v2)
    - name: Enable systemd cgroup
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted
        enabled: true

    - name: Verify install
      command: containerd --version
      register: version

    - debug:
        msg: "{{ version.stdout }}"
